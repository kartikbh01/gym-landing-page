<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Join FitZone Gym</title>

    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../styles/join-form.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <div class="container navbar">
        <h1 class="logo">FitZone</h1>

        <nav>
          <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- Join Section -->
    <section class="join-page">
      <div class="container">
        <div class="join-form-wrapper">
          <div class="join-content">
            <h2>Start Your Fitness Journey</h2>

            <p>
              Join FitZone Gym today and transform yourself with expert
              trainers, and customized workout plans.
            </p>

            <img
              src="https://images.unsplash.com/photo-1517838277536-f5f99be501cd?q=80&w=1000"
              alt="Gym"
            />
          </div>

          <form class="join-form">
            <h3>Membership Registration</h3>

            <input type="text" id="name" placeholder="Full Name" required />

            <input
              type="email"
              id="email"
              placeholder="Email Address"
              required
            />

            <input type="tel" id="phone" placeholder="Phone Number" required />

            <input type="number" id="age" placeholder="Age" required />

            <input
              type="number"
              id="height"
              placeholder="Height (in cm)"
              required
            />

            <input
              type="number"
              id="weight"
              placeholder="Weight (in kg)"
              required
            />

            <select id="plan" required>
              <option value="">Choose Plan</option>
              <option>Basic</option>
              <option>Premium</option>
              <option>Elite</option>
            </select>

            <div class="bmi-result">
              <h4>BMI Status</h4>
              <p id="bmiText">Fill your details to see BMI result</p>
            </div>

            <button type="submit" class="btn">Submit</button>
              <a style="text-decoration: none; color:white; margin-left:10px;" href="./members.html"> View Members </a>
          </form>
        </div>
      </div>
    </section>

    <script type="module" src="../script/joining_form.js"></script>
  </body>
</html>
